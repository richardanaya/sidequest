<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sealed — A Point-and-Click Adventure</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Libre+Baskerville:ital@0;1&display=swap");
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #05080c;
      color: #d4c4a0;
      font-family: "Libre Baskerville", Georgia, serif;
      overflow: hidden;
    }
    #wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: max(12px, 1.5vmin);
      box-sizing: border-box;
    }
    #game {
      display: block;
      /* Fit largest 16:9 rect inside the padded viewport (no 960px cap) */
      --pad: max(24px, 3vmin);
      width: min(calc(100vw - var(--pad)), calc((100vh - var(--pad)) * 16 / 9));
      height: min(calc(100vh - var(--pad)), calc((100vw - var(--pad)) * 9 / 16));
      aspect-ratio: 16 / 9;
      max-width: 100%;
      max-height: 100%;
      border-radius: 4px;
      box-shadow:
        0 0 0 2px #1a3040,
        0 0 0 5px #8a7030,
        0 0 0 7px #1a3040,
        0 24px 60px rgba(0, 0, 0, 0.65);
      background: #0a1018;
      image-rendering: pixelated;
      cursor: crosshair;
    }
    #status { display: none; }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="960" height="540"></canvas>
    <span id="status" hidden>Loading…</span>
  </div>

  <video id="walkVideo" muted playsinline loop preload="auto" crossorigin="anonymous" style="display:none"></video>

  <script type="module">
    import { AdventureEngine } from "./js/adventure-engine.js";

    const engine = new AdventureEngine({
      canvas: document.getElementById("game"),
      walkVideo: document.getElementById("walkVideo"),
      statusEl: document.getElementById("status"),
      contentRoot: "game_sealed",
      cacheBust: "?v=47",
    });

    window.adventure = engine;
    engine.start().catch((err) => console.error(err));
  </script>
</body>
</html>
